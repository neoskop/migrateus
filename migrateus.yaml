environments:
  - name: local
    platform: docker
    containerName: directus-directus-1
    credentials:
      - email: devops@neoskop.de
        token: $TOKEN
        password: $PASSWORD
  - name: dev
    platform: k8s
    context: foo-dev
    namespace: directus
  - name: stage
    platform: k8s
    context: foo-stage
    namespace: directus
  - name: live
    platform: k8s
    context: foo-live
    namespace: directus
    doubleCheck: true
