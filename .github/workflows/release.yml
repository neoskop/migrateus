name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npm install -g npm@latest

      - name: Bump version
        id: version
        run: |
          version=$(pnpm version --no-git-tag-version ${{ inputs.bump }})
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate version file & build
        run: |
          pnpm run gv
          pnpm run build

      - name: Update changelog
        run: pnpm exec git-cliff -o --tag ${{ steps.version.outputs.version }}

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Commit, tag & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release ${{ steps.version.outputs.version }}"
          git tag ${{ steps.version.outputs.version }}
          git push
          git push --tags

      - name: Create GitHub release
        run: gh release create ${{ steps.version.outputs.version }} --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
